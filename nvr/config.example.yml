# Frigate config — local AI camera NVR. Person/vehicle detection runs on THIS
# machine. No cloud, no subscription. Full docs: https://docs.frigate.video
#
# Copy this to config.yml (setup.sh does it) and edit the camera IP + RTSP path.
# The password comes from ../.env (FRIGATE_RTSP_PASSWORD) via {FRIGATE_RTSP_PASSWORD}.
# IMPORTANT: use only letters and digits in the camera-account password. Frigate does
# NOT URL-encode it, so special characters (@ : / # ? % &) will break the RTSP stream.

mqtt:
  enabled: false

detectors:
  # CPU detector works everywhere with no extra hardware. For lower CPU on the same
  # box, Frigate recommends the OpenVINO detector in CPU mode; for many cameras add a
  # Google Coral TPU or use your iGPU (see docs).
  cpu1:
    type: cpu

cameras:
  front_door:
    ffmpeg:
      inputs:
        # Detect on the low-res substream (cheap on CPU)...
        - path: rtsp://camera-account:{FRIGATE_RTSP_PASSWORD}@192.168.1.50:554/stream2
          roles:
            - detect
        # ...and record the high-res main stream.
        - path: rtsp://camera-account:{FRIGATE_RTSP_PASSWORD}@192.168.1.50:554/stream1
          roles:
            - record
    detect:
      width: 640    # match this to your substream resolution
      height: 480
      fps: 5
    objects:
      track:
        - person
        - car
    record:
      enabled: true
      # Frigate 0.14+ uses a tiered record schema (the old record.retain.{days,mode}
      # was removed and is now rejected on startup). continuous.days: 0 = no 24/7
      # recording; set it to 7 for always-on. motion/alerts/detections retained 7-14d.
      continuous:
        days: 0
      motion:
        days: 7
      alerts:
        retain:
          days: 14
          mode: motion
      detections:
        retain:
          days: 14
          mode: motion
    snapshots:
      enabled: true
      retain:
        default: 14

# Add cameras by copying the block above and changing the name + IP. You're only
# bounded by this machine's CPU / RAM / disk — not an 8-camera hub.
#
# --- Reolink example (different RTSP paths than Tapo) -----------------------
# Uncomment (strip the leading "# " from each line) and edit for Reolink cameras.
# The indentation is pre-padded so a plain "# " strip lands at the right YAML level:
#
#   back_yard:
#     ffmpeg:
#       inputs:
#         - path: rtsp://admin:{FRIGATE_RTSP_PASSWORD}@192.168.1.51:554/h264Preview_01_sub
#           roles: [detect]
#         - path: rtsp://admin:{FRIGATE_RTSP_PASSWORD}@192.168.1.51:554/h264Preview_01_main
#           roles: [record]
#     detect: { width: 640, height: 480, fps: 5 }
#     objects: { track: [person, car] }
#     record: { enabled: true, motion: { days: 7 } }
#     snapshots: { enabled: true }
