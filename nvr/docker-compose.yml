services:
  frigate:
    container_name: frigate
    image: ghcr.io/blakeblackshear/frigate:stable
    restart: unless-stopped
    shm_size: "256mb"   # increase if you add more cameras (see Frigate docs)
    # Uncomment for Intel/AMD iGPU hardware acceleration:
    # devices:
    #   - /dev/dri/renderD128
    env_file:
      - ../.env
    volumes:
      - ./config.yml:/config/config.yml:ro
      - ./storage:/media/frigate
      - type: tmpfs
        target: /tmp/cache
        tmpfs:
          size: 1000000000
    ports:
      # Bound to 127.0.0.1 so the UNAUTHENTICATED Frigate UI is reachable only from
      # this host (and via 'tailscale serve', which proxies from localhost). Do NOT
      # change to a bare "5000:5000" / 0.0.0.0 — that exposes your cameras to every
      # device on your LAN.
      - "127.0.0.1:5000:5000"      # web UI
      - "127.0.0.1:8554:8554"      # RTSP restream
      - "127.0.0.1:8555:8555/tcp"  # WebRTC
      - "127.0.0.1:8555:8555/udp"
